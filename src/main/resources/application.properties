spring.application.name=complaint-management-system

# Render assigns the port automatically

server.port=${PORT:8080}

# -------------------- PostgreSQL Database (Render) --------------------

spring.datasource.url=jdbc:postgresql://dpg-lvNbdWsmYgrA9D3DDS55ZWYu7PlGVJcL.render.com:5432/sravanthi_168d
spring.datasource.username=sravanthi
spring.datasource.password=lvNbdWsmYgrA9D3DDS55ZWYu7PlGVJcL
spring.datasource.driver-class-name=org.postgresql.Driver

# -------------------- JPA / Hibernate --------------------

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# -------------------- Logging --------------------

logging.level.com.cms=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n

# -------------------- Jackson --------------------

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

# -------------------- Actuator --------------------

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# -------------------- App Info --------------------

info.app.name=Complaint Management System
info.app.version=1.0.0
info.app.description=REST API for managing customer complaints
