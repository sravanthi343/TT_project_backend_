# ─── Database — H2 FILE-BASED (data persists across restarts) ─────────────────
#
#  The database is stored in the data/ folder at the project root.
#  Files created automatically on first run:
#    data/cmsdb.mv.db      ← all tables and rows live here
#    data/cmsdb.trace.db   ← query trace log (optional)
#
#  DB_CLOSE_DELAY=-1  : keeps the connection open as long as the JVM is running
#  DB_CLOSE_ON_EXIT=false : does not close the DB file when the JVM shuts down
#                           so data is safely flushed and readable next startup
