# H2 Console — open http://localhost:8080/h2-console to browse tables
# IMPORTANT: when connecting, use JDBC URL: jdbc:h2:file:./data/cmsdb
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
#spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# 'update' — creates tables on first run, then only applies schema changes.
# Never drops existing data. Safe for persistent file-based H2.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.cms=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n

# ─── Jackson ──────────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

# ─── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ─── Custom app info ──────────────────────────────────────────────────────────
info.app.name=Complaint Management System
info.app.version=1.0.0
info.app.description=REST API for managing customer complaints

